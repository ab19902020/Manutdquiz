        @keyframes fadeSlideIn {

        }
        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.6); }

            80% { transform: translateX(5px); }

// Unbiased Fisher-Yates shuffle (returns a new array)
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

    return raw ? JSON.parse(raw) : fallback;

// --- SOUND ENGINE (Web Audio API, no external files) ---
const useSound = (enabledRef) => {
  const ctxRef = useRef(null);
  const getCtx = () => {
    if (!ctxRef.current) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) ctxRef.current = new AC();
    }
    if (ctxRef.current && ctxRef.current.state === 'suspended') ctxRef.current.resume();
    return ctxRef.current;
  };
  const tone = (freq, start, duration, type = 'sine', gain = 0.15) => {
    const ctx = getCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
    g.gain.setValueAtTime(0, ctx.currentTime + start);
    g.gain.linearRampToValueAtTime(gain, ctx.currentTime + start + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + duration + 0.02);
  };
  const play = useCallback((name) => {
    if (!enabledRef.current) return;
    switch (name) {
      case 'correct': tone(660, 0, 0.12, 'triangle'); tone(880, 0.1, 0.18, 'triangle'); break;
      case 'wrong': tone(200, 0, 0.25, 'sawtooth', 0.12); tone(150, 0.08, 0.25, 'sawtooth', 0.12); break;
      case 'tick': tone(900, 0, 0.05, 'square', 0.06); break;
      case 'click': tone(500, 0, 0.05, 'square', 0.05); break;
      case 'finish': tone(523, 0, 0.15, 'triangle'); tone(659, 0.13, 0.15, 'triangle'); tone(784, 0.26, 0.15, 'triangle'); tone(1046, 0.39, 0.3, 'triangle'); break;
      default: break;
    }
  }, []);
  const unlock = useCallback(() => { getCtx(); }, []);
  return { play, unlock };
};

    red: "bg-gradient-to-b from-red-600 to-red-800 text-white border-b-4 border-red-950 hover:from-red-500 hover:to-red-700 shadow-[0_0_15px_rgba(220,38,38,0.4)]",
    gold: "bg-gradient-to-b from-yellow-300 via-yellow-500 to-yellow-600 text-yellow-950 border-b-4 border-yellow-800 hover:from-yellow-200 hover:to-yellow-400 shadow-[0_0_15px_rgba(202,138,4,0.4)]",
    dark: "bg-gradient-to-b from-gray-800 to-gray-900 text-white border-b-4 border-black hover:from-gray-700 hover:to-gray-800",
  };
  return (
    <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>
      {IconComponent && <IconComponent size={24} />}
      {children}
    </button>
  );
};

// Pill-style selector for the setup screen
const Chip = ({ active, onClick, children }) => (
  <button
    onClick={onClick}
    className={`px-4 py-2 rounded-full font-bold text-sm md:text-base tracking-wide transition-all duration-150 border ${
      active
        ? 'bg-gradient-to-b from-red-600 to-red-800 text-white border-red-950 shadow-[0_0_12px_rgba(220,38,38,0.5)]'
        : 'bg-black/50 text-gray-300 border-red-900/40 hover:border-red-600/60 hover:text-white'
    }`}
  >
    {children}
  </button>
);

// --- MAIN APP COMPONENT ---
function App() {
  const [screen, setScreen] = useState('menu');
  const [activeQuestions, setActiveQuestions] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [streak, setStreak] = useState(0);
  const [maxStreak, setMaxStreak] = useState(0);
  const [lastGain, setLastGain] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [isAnswerCorrect, setIsAnswerCorrect] = useState(null);

  const [timeLeft, setTimeLeft] = useState(TIMER_SECONDS);
  const currentIndexRef = useRef(0);
  useEffect(() => { currentIndexRef.current = currentIndex; }, [currentIndex]);

  // Persisted state
  const [settings, setSettings] = useState(() => load('mufc_settings', { timer: true, sound: true }));
  const [boards, setBoards] = useState(() => {
    const stored = load('mufc_boards', null);
    if (stored) return { ...DEFAULT_BOARDS, ...stored };
    // Migrate the old single classic leaderboard if present
    const legacy = load('mufc_leaderboard', null);
    return legacy ? { ...DEFAULT_BOARDS, classic: legacy } : DEFAULT_BOARDS;
  });
  const [playerName, setPlayerName] = useState(() => load('mufc_playername', ''));
  const [savedThisRound, setSavedThisRound] = useState(false);
  const [shareMsg, setShareMsg] = useState('');

  // Setup choices
  const [mode, setMode] = useState('classic');
  const [category, setCategory] = useState('All');
  const [difficulty, setDifficulty] = useState('All');
  const [quizLength, setQuizLength] = useState(10);
  const [boardTab, setBoardTab] = useState('classic');

  // Round tracking for Sudden Death / Blitz
  const [answeredCount, setAnsweredCount] = useState(0);
  const [blitzLeft, setBlitzLeft] = useState(BLITZ_SECONDS);

  // Sound engine reads latest "sound" setting via ref
  const soundRef = useRef(settings.sound);
  useEffect(() => { soundRef.current = settings.sound; }, [settings.sound]);
  const { play, unlock } = useSound(soundRef);

  // Persist settings & leaderboards whenever they change
  useEffect(() => { save('mufc_settings', settings); }, [settings]);
  useEffect(() => { save('mufc_boards', boards); }, [boards]);

  const matches = (q) =>
    (category === 'All' || q.cat === category) &&
    (difficulty === 'All' || q.diff === difficulty);

  const availableCount = QUESTION_BANK.filter(matches).length;

  const beginQuiz = () => {
    unlock(); // unlock audio on user gesture
    const pool = QUESTION_BANK.filter(matches);

    // Sudden Death & Blitz run through the whole (shuffled) pool;
    // Classic uses the chosen length and avoids recently-seen questions.
    let picked;
    if (mode === 'classic') {
      const recent = load(RECENT_KEY, []);
      const fresh = pool.filter(q => !recent.includes(q.question));
      const need = Math.min(quizLength, pool.length);
      const sourcePool = fresh.length >= need ? fresh : pool;
      picked = shuffle(sourcePool).slice(0, need);
      const newRecent = [...picked.map(q => q.question), ...recent].slice(0, 200);
      save(RECENT_KEY, newRecent);
    } else {
      picked = shuffle(pool);
    }

    // Shuffle each question's options so the correct answer isn't always
    // in the same slot, and recompute where the correct answer landed.
    const prepared = picked.map(q => {
      const order = shuffle(q.options.map((opt, i) => ({ opt, i })));
      return {
        ...q,
        options: order.map(o => o.opt),
        correct: order.findIndex(o => o.i === q.correct),
      };
    });

    setActiveQuestions(prepared);
    setCurrentIndex(0);
    setScore(0);
    setCorrectCount(0);
    setAnsweredCount(0);
    setStreak(0);
    setMaxStreak(0);
    setLastGain(0);
    setSelectedAnswer(null);
    setIsAnswerCorrect(null);
    setSavedThisRound(false);
    setShareMsg('');
    setTimeLeft(TIMER_SECONDS);
    setBlitzLeft(BLITZ_SECONDS);
    setScreen('quiz');
  };

  // Per-question countdown (Classic & Sudden Death). Blitz uses its own clock.
  useEffect(() => {
    if (screen !== 'quiz' || mode === 'blitz' || !settings.timer || selectedAnswer !== null) return;
    if (timeLeft === 0) {
      handleAnswerTimeOut();
      return;
    }
    if (timeLeft <= 5) play('tick');
    const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
    return () => clearInterval(timer);
  }, [timeLeft, screen, selectedAnswer, settings.timer, mode]);

  // Blitz global clock — runs whatever happens until time is up.
  useEffect(() => {
    if (screen !== 'quiz' || mode !== 'blitz') return;
    if (blitzLeft === 0) {
      finishQuiz();
      return;
    }
    if (blitzLeft <= 10) play('tick');
    const timer = setInterval(() => setBlitzLeft(prev => prev - 1), 1000);
    return () => clearInterval(timer);
  }, [blitzLeft, screen, mode]);

  const goToNextQuestion = useCallback(() => {
    if (currentIndexRef.current < activeQuestions.length - 1) {
      setCurrentIndex(prev => prev + 1);
      setSelectedAnswer(null);
      setIsAnswerCorrect(null);
      setTimeLeft(TIMER_SECONDS);
    } else {
      finishQuiz();
    }
  }, [activeQuestions.length]);

  const handleAnswerTimeOut = useCallback(() => {
    setSelectedAnswer(-1);
    setIsAnswerCorrect(false);
    setAnsweredCount(prev => prev + 1);
    setStreak(0);
    setLastGain(0);
    play('wrong');
  }, []);

  const handleAnswer = (index) => {
    if (selectedAnswer !== null) return;
    setSelectedAnswer(index);
    const correct = index === activeQuestions[currentIndex].correct;
    setIsAnswerCorrect(correct);
    setAnsweredCount(prev => prev + 1);

    if (correct) {
      const newStreak = streak + 1;
      let gain;
      if (mode === 'blitz') {
        // Flat reward + growing streak bonus; speed comes from answering more.
        gain = 100 + Math.min(newStreak - 1, 10) * 20;
      } else {
        const timeBonus = settings.timer ? Math.round((timeLeft / TIMER_SECONDS) * 500) : 0;
        const streakBonus = Math.min(newStreak - 1, 5) * 100; // up to +500 for hot streaks
        gain = 500 + timeBonus + streakBonus;
      }
      setScore(prev => prev + gain);
      setLastGain(gain);
      setCorrectCount(prev => prev + 1);
      setStreak(newStreak);
      setMaxStreak(prev => Math.max(prev, newStreak));
      play('correct');
      if (mode === 'blitz') setTimeout(() => { if (currentIndexRef.current === currentIndex) goToNextQuestion(); }, 650);
    } else {
      setStreak(0);
      setLastGain(0);
      play('wrong');
      if (mode === 'blitz') setTimeout(() => { if (currentIndexRef.current === currentIndex) goToNextQuestion(); }, 900);
    }
  };

  const finishQuiz = () => {
    play('finish');
    setScreen('result');
  };

  const modeBoard = boards[mode] || [];
  const qualifiesForBoard = score > 0 && (modeBoard.length < 5 || score > modeBoard[modeBoard.length - 1].score);

  const saveScore = () => {
    const name = (playerName || '').trim() || 'You (Guest)';
    save('mufc_playername', name);
    setPlayerName(name);
    setBoards(prev => {
      const updated = [...(prev[mode] || []), { name, score }];
      return { ...prev, [mode]: updated.sort((a, b) => b.score - a.score).slice(0, 5) };
    });
    setSavedThisRound(true);
    play('click');
  };

  const resetLeaderboard = () => {
    setBoards(prev => ({ ...prev, [boardTab]: DEFAULT_BOARDS[boardTab] }));
    play('click');
  };

  const shareResult = async () => {
    const total = mode === 'classic' ? activeQuestions.length : answeredCount;
    const modeName = (MODES.find(m => m.id === mode) || MODES[0]).name;
    const text = `I scored ${score} (${correctCount}/${total} correct) on the Manchester United Pub Quiz (${modeName} mode)! 🔴⚪ Can you beat me?`;
    play('click');
    try {
      if (navigator.share) {
        await navigator.share({ title: 'Man Utd Pub Quiz', text });
      } else if (navigator.clipboard) {
        await navigator.clipboard.writeText(text);
        setShareMsg('Copied to clipboard!');
        setTimeout(() => setShareMsg(''), 2500);
      } else {
        setShareMsg(text);
      }
    } catch (e) {
      /* user cancelled the share sheet */
    }
  };

  // Keyboard support: 1-N to answer; Enter / Space / arrow / N to advance
  useEffect(() => {
    if (screen !== 'quiz') return;
    const onKey = (e) => {
      const q = activeQuestions[currentIndex];
      if (!q) return;
      if (selectedAnswer === null) {
        const n = parseInt(e.key, 10);
        if (n >= 1 && n <= q.options.length) handleAnswer(n - 1);
      } else if (mode !== 'blitz') { // blitz auto-advances
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight' || e.key.toLowerCase() === 'n') {
          e.preventDefault();
          if (mode === 'sudden' && !isAnswerCorrect) finishQuiz();
          else goToNextQuestion();
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [screen, selectedAnswer, isAnswerCorrect, mode, currentIndex, activeQuestions, timeLeft, streak, settings.timer, goToNextQuestion]);

  const renderMenu = () => (
    <div className="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 space-y-6">
      <Logo />
      <div className="bg-red-950/80 backdrop-blur-md border border-red-800/50 rounded-full px-6 py-3 flex items-center gap-3 text-yellow-500 text-sm md:text-base font-bold tracking-widest shadow-[0_0_15px_rgba(220,38,38,0.4)]">
        <FlameIcon size={20} className="text-red-500 animate-pulse" />
        {QUESTION_BANK.length} QUESTIONS • {MODES.length} MODES
      </div>
      <div className="flex flex-col gap-5 mt-6">
        <ActionButton onClick={() => { unlock(); setScreen('setup'); }} variant="red" icon={PlayIcon}>PLAY NOW</ActionButton>
        <ActionButton onClick={() => { setBoardTab(mode); setScreen('leaderboard'); }} variant="gold" icon={TrophyIcon}>LEADERBOARD</ActionButton>
        <ActionButton onClick={() => setScreen('settings')} variant="dark" icon={SettingsIcon}>SETTINGS</ActionButton>
      </div>
    </div>
  );

  const renderSetup = () => (
    <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 pt-12 max-w-2xl mx-auto w-full">
      <h2 className="text-3xl md:text-4xl font-black text-white mb-8 tracking-widest uppercase">Match Setup</h2>

      <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
        <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Game Mode</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          {MODES.map(m => (
            <button
              key={m.id}
              onClick={() => { setMode(m.id); play('click'); }}
              className={`text-left p-4 rounded-2xl border transition-all duration-150 ${
                mode === m.id
                  ? 'bg-gradient-to-b from-red-700/80 to-red-950/80 border-red-500 shadow-[0_0_18px_rgba(220,38,38,0.5)]'
                  : 'bg-black/50 border-red-900/40 hover:border-red-600/60'
              }`}
            >
              <span className="flex items-center gap-2 font-black uppercase tracking-wider text-white">
                {m.id === 'classic' && <PlayIcon size={18} className="text-yellow-500" />}
                {m.id === 'sudden' && <FlameIcon size={18} className="text-orange-500" />}
                {m.id === 'blitz' && <ClockIcon size={18} className="text-sky-400" />}
                {m.name}
              </span>
              <span className="block text-xs text-gray-300 mt-1 leading-snug">{m.tagline}</span>
            </button>
          ))}
        </div>
        <p className="text-gray-400 text-xs mt-3 leading-relaxed">{(MODES.find(m => m.id === mode) || MODES[0]).desc}</p>
      </div>

      <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
        <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Category</p>
        <div className="flex flex-wrap gap-2">
          {CATEGORIES.map(c => (
            <Chip key={c} active={category === c} onClick={() => { setCategory(c); play('click'); }}>{c}</Chip>
          ))}
        </div>
      </div>

      <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
        <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Difficulty</p>
        <div className="flex flex-wrap gap-2">
          {DIFFICULTIES.map(d => (
            <Chip key={d} active={difficulty === d} onClick={() => { setDifficulty(d); play('click'); }}>{d}</Chip>
          ))}
        </div>
      </div>

      {mode === 'classic' && (
        <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
          <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Number of Questions</p>
          <div className="flex flex-wrap gap-2">
            {LENGTHS.map(l => (
              <Chip key={l} active={quizLength === l} onClick={() => { setQuizLength(l); play('click'); }}>{l}</Chip>
            ))}
          </div>
        </div>
      )}

      <p className="text-gray-400 text-sm mb-6">
        {availableCount} question{availableCount === 1 ? '' : 's'} match your filters
        {mode === 'classic' && availableCount < quizLength ? ` — you'll get ${availableCount}.` : '.'}
      </p>

      <div className="flex flex-col gap-4 w-full items-center">
        <ActionButton onClick={beginQuiz} variant="red" icon={PlayIcon} className={availableCount === 0 ? 'opacity-40 pointer-events-none' : ''}>KICK OFF</ActionButton>
        <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>BACK</ActionButton>
      </div>
    </div>
  );

  const renderQuiz = () => {
    const question = activeQuestions[currentIndex];
    const isTimeout = selectedAnswer === -1;
    const answered = selectedAnswer !== null;
    const isLast = currentIndex === activeQuestions.length - 1;
    const runOver = mode === 'sudden' && answered && !isAnswerCorrect; // Sudden Death: one mistake ends it
    const diffColor = question?.diff === 'Easy' ? 'bg-green-900/70 text-green-300 border-green-700/50'
      : question?.diff === 'Hard' ? 'bg-red-900/70 text-red-300 border-red-700/50'
      : 'bg-yellow-900/70 text-yellow-300 border-yellow-700/50';

    return (
      <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 max-w-4xl mx-auto w-full pt-12 pb-12">
        <div className="flex justify-between items-center w-full mb-4 text-yellow-500 font-bold tracking-widest text-lg">
          <div>
            {mode === 'classic' && <>Q: {currentIndex + 1} / {activeQuestions.length}</>}
            {mode === 'sudden' && <span className="flex items-center gap-2"><FlameIcon size={20} className="text-orange-500" /> Q: {currentIndex + 1}</span>}
            {mode === 'blitz' && <span className={`flex items-center gap-2 ${blitzLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-sky-400'}`}><ClockIcon size={22} /> {blitzLeft}s</span>}
          </div>
          <div className="flex items-center gap-4">
            {streak >= 2 && (
              <span className="flex items-center gap-1 text-orange-400 animate-pulse">
                <FlameIcon size={20} /> x{streak}
              </span>
            )}
            <span className="relative">
              SCORE: {score}
              {lastGain > 0 && answered && (
                <span key={`${currentIndex}-${lastGain}`} className="score-float absolute -top-5 right-0 text-green-400 font-black text-base">+{lastGain}</span>
              )}
            </span>
          </div>
        </div>

        {mode === 'blitz' ? (
          <div className="w-full bg-sky-950 h-3 rounded-full mb-8 overflow-hidden border border-sky-900">
            <div
              className={`h-full rounded-full transition-all duration-1000 ease-linear ${blitzLeft <= 10 ? 'bg-red-500' : 'bg-sky-400'}`}
              style={{ width: `${(blitzLeft / BLITZ_SECONDS) * 100}%` }}
            ></div>
          </div>
        ) : settings.timer ? (
          <div className="w-full bg-red-950 h-3 rounded-full mb-8 overflow-hidden border border-red-900">
            <div
              className={`h-full rounded-full transition-all duration-1000 ease-linear ${timeLeft < 5 ? 'bg-red-500' : 'bg-yellow-500'}`}
              style={{ width: `${(timeLeft / TIMER_SECONDS) * 100}%` }}
            ></div>
          </div>
        ) : <div className="mb-8" />}

        <div key={currentIndex} className="q-anim bg-black/60 backdrop-blur-md border border-red-900/50 p-6 md:p-10 rounded-3xl w-full mb-6 shadow-[0_0_30px_rgba(0,0,0,0.8)] min-h-[150px] flex flex-col items-center justify-center text-center">
          <div className="flex gap-2 mb-4">
            <span className="px-3 py-1 rounded-full text-xs font-bold tracking-wider uppercase border bg-black/60 text-gray-300 border-red-900/50">{question?.cat}</span>
            <span className={`px-3 py-1 rounded-full text-xs font-bold tracking-wider uppercase border ${diffColor}`}>{question?.diff}</span>
          </div>
          <h2 className="text-xl md:text-2xl lg:text-3xl font-bold text-white leading-relaxed">
            {question?.question}
          </h2>
        </div>

        <div key={`opts-${currentIndex}`} className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
          {question?.options.map((opt, idx) => {
            let btnState = "bg-gradient-to-b from-gray-800 to-gray-900 border-gray-700 text-gray-200 hover:from-gray-700";
            let extraAnim = "opt-anim";
            if (answered) {
              extraAnim = "";
              if (idx === question.correct) {
                btnState = "bg-gradient-to-b from-green-600 to-green-800 border-green-900 text-white shadow-[0_0_20px_rgba(22,163,74,0.6)]";
              } else if (idx === selectedAnswer) {
                btnState = "bg-gradient-to-b from-red-600 to-red-800 border-red-950 text-white opacity-80";
                extraAnim = "shake-anim";
              } else {
                btnState = "bg-gray-900 border-gray-950 text-gray-600 opacity-50";
              }
            }
            return (
              <button
                key={idx}
                disabled={answered}
                onClick={() => handleAnswer(idx)}
                style={!answered ? { animationDelay: `${idx * 60}ms` } : undefined}
                className={`relative py-5 px-6 rounded-2xl border-b-4 font-bold text-base md:text-lg transition-all duration-200 active:translate-y-1 active:border-b-0 flex items-center justify-center text-center gap-3 ${extraAnim} ${btnState}`}
              >
                <span className="hidden md:flex items-center justify-center w-7 h-7 rounded-md bg-black/40 text-sm text-gray-400 shrink-0">{idx + 1}</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>

        {/* Feedback + explanation (Blitz auto-advances, so keep it minimal there) */}
        {answered && (
          <div className="w-full mt-6 flex flex-col items-center gap-4">
            <div className={`pop-anim font-black text-2xl tracking-widest uppercase flex items-center gap-2 ${isAnswerCorrect ? 'text-green-400' : 'text-red-500'}`}>
              {isAnswerCorrect ? (<><CheckIcon size={28} /> Correct! +{lastGain}</>) : isTimeout ? (<>Time's Up!</>) : runOver ? (<><FlameIcon size={28} /> Run Over!</>) : (<><XIcon size={28} /> Wrong!</>)}
            </div>
            {mode !== 'blitz' && question?.explain && (
              <div className="pop-anim w-full bg-black/50 border border-yellow-700/40 rounded-2xl p-5 text-center">
                {!isAnswerCorrect && (
                  <p className="text-green-400 font-bold mb-1">Answer: {question.options[question.correct]}</p>
                )}
                <p className="text-gray-200 leading-relaxed">{question.explain}</p>
              </div>
            )}
            {mode !== 'blitz' && (
              <ActionButton
                onClick={() => { if (runOver || (mode === 'sudden' && isTimeout)) finishQuiz(); else goToNextQuestion(); }}
                variant={(isLast || runOver) ? 'gold' : 'red'}
                icon={(isLast || runOver) ? TrophyIcon : ArrowRightIcon}
              >
                {(isLast || runOver) ? 'SEE RESULTS' : 'NEXT'}
              </ActionButton>
            )}
          </div>
        )}
      </div>
    );
  };

  const renderResult = () => {
    const total = mode === 'classic' ? activeQuestions.length : answeredCount;
    const pct = total ? Math.round((correctCount / total) * 100) : 0;
    const modeName = (MODES.find(m => m.id === mode) || MODES[0]).name;
    let verdict = "Keep practising, Red!";
    if (mode === 'sudden') {
      if (correctCount >= 25) verdict = "Immortal! That's a Sir Bobby-level run.";
      else if (correctCount >= 15) verdict = "Heroic run — the Stretford End salutes you!";
      else if (correctCount >= 8) verdict = "A solid shift before the tackle came in.";
      else if (correctCount >= 3) verdict = "Early bath — go again, Red!";
      else verdict = "Sent off in the warm-up. Have another go!";
    } else if (mode === 'blitz') {
      if (correctCount >= 25) verdict = "Counter-attacking machine — vintage United pace!";
      else if (correctCount >= 18) verdict = "Rapid! That's Yorke-and-Cole tempo.";
      else if (correctCount >= 10) verdict = "Good pace — one more sprint in you?";
      else verdict = "Slow build-up play. Quicker next time, Red!";
    } else {
      if (pct === 100) verdict = "Flawless — a true Old Trafford legend!";
      else if (pct >= 80) verdict = "Outstanding! Fergie would be proud.";
      else if (pct >= 60) verdict = "Solid performance, top-half finish.";
      else if (pct >= 40) verdict = "Mid-table — room to improve.";
    }
    const celebrate = pct >= 70 && correctCount >= 3;
    const ringCirc = 2 * Math.PI * 42; // r = 42

    return (
      <div className="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 text-center space-y-6 py-12">
        {celebrate && (
          <div aria-hidden="true">
            {Array.from({ length: 40 }).map((_, i) => (
              <div
                key={i}
                className="confetti-piece"
                style={{
                  left: `${(i * 47) % 100}%`,
                  backgroundColor: ['#dc2626', '#fde047', '#ffffff', '#ca8a04'][i % 4],
                  animationDuration: `${2.4 + (i % 5) * 0.45}s`,
                  animationDelay: `${(i % 8) * 0.22}s`,
                  borderRadius: i % 3 === 0 ? '50%' : '2px',
                }}
              ></div>
            ))}
          </div>
        )}
        <img src="https://iili.io/CfNugZx.md.png" alt="United Road Logo" className="w-28 md:w-40 opacity-80" />
        <div className="pop-anim bg-black/60 backdrop-blur-md border border-yellow-600/50 p-8 md:p-10 rounded-3xl flex flex-col items-center shadow-[0_0_40px_rgba(202,138,4,0.2)] w-full max-w-md">
          <span className="px-4 py-1 rounded-full text-xs font-bold tracking-widest uppercase border border-red-700/60 bg-red-950/60 text-red-300 mb-4">{modeName} Mode</span>
          <TrophyIcon size={56} className="text-yellow-500 mb-3 drop-shadow-[0_0_10px_rgba(202,138,4,0.8)]" />
          <h2 className="text-3xl md:text-4xl font-black text-white mb-1 tracking-wider">FULL TIME!</h2>
          <p className="text-gray-400 text-sm uppercase tracking-widest mb-6">Your Final Score</p>
          <div className="text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-[#fde047] to-[#ca8a04]">
            {score}
          </div>

          <div className="flex gap-6 mt-6 text-center items-center">
            <div>
              <div className="text-2xl font-black text-white">{correctCount}/{total}</div>
              <div className="text-xs text-gray-400 uppercase tracking-widest">Correct</div>
            </div>
            <div className="relative w-24 h-24 flex items-center justify-center">
              <svg className="absolute inset-0 -rotate-90" viewBox="0 0 96 96">
                <circle cx="48" cy="48" r="42" fill="none" stroke="rgba(127,29,29,0.5)" strokeWidth="7" />
                <circle
                  cx="48" cy="48" r="42" fill="none"
                  stroke={pct >= 70 ? '#22c55e' : pct >= 40 ? '#eab308' : '#dc2626'}
                  strokeWidth="7" strokeLinecap="round"
                  strokeDasharray={ringCirc}
                  strokeDashoffset={ringCirc * (1 - pct / 100)}
                  className="ring-anim"
                />
              </svg>
              <div>
                <div className="text-xl font-black text-white">{pct}%</div>
                <div className="text-[9px] text-gray-400 uppercase tracking-widest">Accuracy</div>
              </div>
            </div>
            <div>
              <div className="text-2xl font-black text-orange-400 flex items-center justify-center gap-1"><FlameIcon size={18} />{maxStreak}</div>
              <div className="text-xs text-gray-400 uppercase tracking-widest">Best Streak</div>
            </div>
          </div>

          <p className="text-yellow-500/90 font-bold mt-6 italic">{verdict}</p>

          {qualifiesForBoard && !savedThisRound && (
            <div className="w-full mt-6 border-t border-red-900/40 pt-6">
              <p className="text-white font-bold mb-3">🏆 New high score! Save it:</p>
              <div className="flex gap-2">
                <input
                  type="text"
                  maxLength={16}
                  value={playerName}
                  onChange={(e) => setPlayerName(e.target.value)}
                  placeholder="Your name"
                  className="flex-1 bg-black/60 border border-red-900/60 rounded-lg px-4 py-3 text-white font-bold focus:outline-none focus:border-yellow-500"
                />
                <button onClick={saveScore} className="bg-gradient-to-b from-yellow-300 to-yellow-600 text-yellow-950 font-black px-5 rounded-lg border-b-4 border-yellow-800 active:translate-y-1 active:border-b-0">
                  SAVE
                </button>
              </div>
            </div>
          )}
          {savedThisRound && (
            <p className="text-green-400 font-bold mt-6 flex items-center gap-2"><CheckIcon size={20} /> Saved to the leaderboard!</p>
          )}

          <button onClick={shareResult} className="mt-6 flex items-center gap-2 text-gray-300 hover:text-white font-bold uppercase tracking-widest text-sm transition-colors">
            <ShareIcon size={18} /> Share your score
          </button>
          {shareMsg && <p className="text-green-400 text-sm mt-2">{shareMsg}</p>}
        </div>

        <div className="flex flex-col gap-4 w-full items-center">
          <ActionButton onClick={beginQuiz} variant="red" icon={PlayIcon}>PLAY AGAIN</ActionButton>
          <ActionButton onClick={() => { setBoardTab(mode); setScreen('leaderboard'); }} variant="gold" icon={TrophyIcon}>LEADERBOARD</ActionButton>
          <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>MAIN MENU</ActionButton>
        </div>
      </div>
    );
  };

  const renderLeaderboard = () => (
    <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 pt-16 max-w-2xl mx-auto w-full">
      <h2 className="text-4xl font-black text-white mb-8 flex items-center gap-3 tracking-widest uppercase">
        <MedalIcon className="text-yellow-500" size={40} />
        Leaderboard
      </h2>
      <div className="flex gap-2 mb-6">
        {MODES.map(m => (
          <Chip key={m.id} active={boardTab === m.id} onClick={() => { setBoardTab(m.id); play('click'); }}>{m.name}</Chip>
        ))}
      </div>
      <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl overflow-hidden mb-6 shadow-2xl">
        {(boards[boardTab] || []).map((entry, idx) => (
          <div key={idx} className={`flex justify-between items-center p-6 border-b border-red-900/30 last:border-0 ${idx === 0 ? 'bg-red-950/60' : ''}`}>
            <div className="flex items-center gap-4">
              <span className={`font-black text-2xl ${idx === 0 ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]' : idx === 1 ? 'text-gray-300' : idx === 2 ? 'text-amber-700' : 'text-red-500'}`}>
                #{idx + 1}
              </span>
              <span className="text-white font-bold text-xl">{entry.name}</span>
            </div>
            <span className="text-yellow-500 font-mono font-black text-2xl">{entry.score}</span>
          </div>
        ))}
        {(boards[boardTab] || []).length === 0 && (
          <p className="p-6 text-gray-400 text-center">No scores yet — be the first!</p>
        )}
      </div>
      <button onClick={resetLeaderboard} className="text-gray-500 hover:text-red-400 text-sm font-bold uppercase tracking-widest mb-8 transition-colors">
        Reset This Leaderboard
      </button>
      <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>BACK TO MENU</ActionButton>
    </div>
  );

  const renderSettings = () => (
    <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 pt-16 max-w-xl mx-auto w-full">
      <h2 className="text-4xl font-black text-white mb-10 flex items-center gap-3 tracking-widest uppercase">
        <SettingsIcon className="text-gray-400" size={40} />
        Settings
      </h2>
      <div className="w-full space-y-6 mb-12">
        <div className="bg-black/60 backdrop-blur-md border border-red-900/50 p-6 rounded-2xl flex justify-between items-center">
          <div className="flex items-center gap-4">
            <ClockIcon className="text-red-500" size={28} />
            <span className="text-white font-bold text-xl">Quiz Timer</span>
          </div>
          <button onClick={() => { setSettings(s => ({ ...s, timer: !s.timer })); play('click'); }} className={`w-20 h-10 rounded-full p-1 transition-colors duration-300 ${settings.timer ? 'bg-green-600' : 'bg-gray-700'}`}>
            <div className={`w-8 h-8 bg-white rounded-full transition-transform duration-300 ${settings.timer ? 'translate-x-10' : 'translate-x-0'}`}></div>
          </button>
        </div>
        <div className="bg-black/60 backdrop-blur-md border border-red-900/50 p-6 rounded-2xl flex justify-between items-center">
          <div className="flex items-center gap-4">
            {settings.sound ? <Volume2Icon className="text-red-500" size={28} /> : <VolumeXIcon className="text-gray-500" size={28} />}
            <span className="text-white font-bold text-xl">Sound Effects</span>
          </div>
          <button onClick={() => { unlock(); const next = !settings.sound; setSettings(s => ({ ...s, sound: next })); if (next) { soundRef.current = true; play('correct'); } }} className={`w-20 h-10 rounded-full p-1 transition-colors duration-300 ${settings.sound ? 'bg-green-600' : 'bg-gray-700'}`}>
            <div className={`w-8 h-8 bg-white rounded-full transition-transform duration-300 ${settings.sound ? 'translate-x-10' : 'translate-x-0'}`}></div>
          </button>
        </div>
      </div>
      <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>BACK TO MENU</ActionButton>
    </div>
  );

  return (
    <div className="min-h-screen font-sans selection:bg-red-500 selection:text-white">
      <SpotlightBackground />
      {screen === 'menu' && renderMenu()}
      {screen === 'setup' && renderSetup()}
      {screen === 'quiz' && renderQuiz()}
      {screen === 'result' && renderResult()}
      {screen === 'leaderboard' && renderLeaderboard()}
      {screen === 'settings' && renderSettings()}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
