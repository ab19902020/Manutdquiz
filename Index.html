          { question: "Who scored United's winner in the 2016 FA Cup final against Crystal Palace?", options: ["Juan Mata", "Jesse Lingard", "Marcus Rashford", "Anthony Martial"], correct: 1, cat: "Legends & Matches", diff: "Medium" },
          { question: "Who scored both goals as United won the 2017 EFL Cup final against Southampton?", options: ["Zlatan Ibrahimovic", "Jesse Lingard", "Henrikh Mkhitaryan", "Juan Mata"], correct: 0, cat: "Treble & Europe", diff: "Medium" },
          { question: "What nationality is former United and Serbia defender Nemanja Vidic?", options: ["Croatian", "Serbian", "Bosnian", "Slovenian"], correct: 1, cat: "Legends & Matches", diff: "Easy" },
          { question: "From which club did United sign David de Gea in 2011?", options: ["Real Madrid", "Atletico Madrid", "Valencia", "Sevilla"], correct: 1, cat: "Modern Era", diff: "Medium" },
          { question: "Roy Keane left United in 2005 and briefly joined which club before retiring?", options: ["Sunderland", "Celtic", "Nottingham Forest", "Ipswich Town"], correct: 1, cat: "Transfers", diff: "Hard" },
          { question: "Which 'Class of '92' graduate retired in 2011 as a one-club man and later co-owned Salford City?", options: ["Paul Scholes", "Gary Neville", "Nicky Butt", "Phil Neville"], correct: 1, cat: "Legends & Matches", diff: "Medium" }
        ];

        const QUESTION_BANK = REAL_QUESTIONS;
        const CATEGORIES = ["All", ...Array.from(new Set(QUESTION_BANK.map(q => q.cat)))];
        const DIFFICULTIES = ["All", "Easy", "Medium", "Hard"];
        const LENGTHS = [5, 10, 20];

        const DEFAULT_LEADERBOARD = [
          { name: "Sir Alex F.", score: 10000 },
          { name: "W. Rooney", score: 8500 },
          { name: "B. Fernandes", score: 7200 },
          { name: "R. Giggs", score: 6800 },
          { name: "P. Scholes", score: 5500 },
        ];

        const TIMER_SECONDS = 15;

        // Unbiased Fisher-Yates shuffle (returns a new array)
        const shuffle = (arr) => {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        };

        // --- PERSISTENCE HELPERS ---
        const load = (key, fallback) => {
          try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
          } catch (e) {
            return fallback;
          }
        };
        const save = (key, value) => {
          try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore */ }
        };

        // --- SOUND ENGINE (Web Audio API, no external files) ---
        const useSound = (enabledRef) => {
          const ctxRef = useRef(null);
          const getCtx = () => {
            if (!ctxRef.current) {
              const AC = window.AudioContext || window.webkitAudioContext;
              if (AC) ctxRef.current = new AC();
            }
            if (ctxRef.current && ctxRef.current.state === 'suspended') ctxRef.current.resume();
            return ctxRef.current;
          };
          const tone = (freq, start, duration, type = 'sine', gain = 0.15) => {
            const ctx = getCtx();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
            g.gain.setValueAtTime(0, ctx.currentTime + start);
            g.gain.linearRampToValueAtTime(gain, ctx.currentTime + start + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + duration);
            osc.connect(g);
            g.connect(ctx.destination);
            osc.start(ctx.currentTime + start);
            osc.stop(ctx.currentTime + start + duration + 0.02);
          };
          const play = useCallback((name) => {
            if (!enabledRef.current) return;
            switch (name) {
              case 'correct': tone(660, 0, 0.12, 'triangle'); tone(880, 0.1, 0.18, 'triangle'); break;
              case 'wrong': tone(200, 0, 0.25, 'sawtooth', 0.12); tone(150, 0.08, 0.25, 'sawtooth', 0.12); break;
              case 'tick': tone(900, 0, 0.05, 'square', 0.06); break;
              case 'click': tone(500, 0, 0.05, 'square', 0.05); break;
              case 'finish': tone(523, 0, 0.15, 'triangle'); tone(659, 0.13, 0.15, 'triangle'); tone(784, 0.26, 0.15, 'triangle'); tone(1046, 0.39, 0.3, 'triangle'); break;
              default: break;
            }
          }, []);
          // unlock audio context on first user gesture
          const unlock = useCallback(() => { getCtx(); }, []);
          return { play, unlock };
        };

        // --- COMPONENTS ---

        const SpotlightBackground = () => (

            <div className="absolute -top-32 -right-32 w-96 h-96 bg-red-600 rounded-full mix-blend-screen filter blur-[120px] opacity-60 animate-pulse" style={{ animationDuration: '5s' }}></div>
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.05)_0,transparent_1px)] bg-[size:24px_24px] opacity-30"></div>
          </div>
        );

        const Logo = () => (
          <div className="relative z-10 flex flex-col items-center mb-6 drop-shadow-2xl">
            <div className="bg-black/30 backdrop-blur-md p-6 rounded-3xl border border-red-900/50 shadow-[0_0_30px_rgba(220,38,38,0.3)] flex flex-col items-center">
              <img
                src="https://iili.io/CfNugZx.md.png"
                alt="United Road Logo"
                className="w-48 md:w-64 object-contain drop-shadow-[0_0_15px_rgba(220,38,38,0.8)] transition-transform hover:scale-105 duration-300"
              />
              <div className="mt-6 text-center tracking-wider">
                <h1 className="text-4xl md:text-5xl font-black uppercase flex flex-col items-center">
                  <span className="text-white drop-shadow-md tracking-[0.2em] mb-1">PUB QUIZ</span>
                  <span className="text-transparent bg-clip-text bg-gradient-to-b from-[#fde047] via-[#ca8a04] to-[#854d0e] drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] text-lg md:text-xl font-bold tracking-widest border-t border-yellow-700/50 pt-2 w-full">
                    THE ULTIMATE TEST
                  </span>
                </h1>
              </div>
            </div>
          </div>
        );

        const ActionButton = ({ onClick, children, variant = 'red', className = '', icon: IconComponent }) => {
          const baseStyle = "relative w-72 py-4 px-6 font-bold text-xl uppercase tracking-wider rounded-lg transition-all duration-150 active:translate-y-1 active:border-b-0 flex items-center justify-center gap-3 z-10 cursor-pointer";
          const variants = {
            red: "bg-gradient-to-b from-red-600 to-red-800 text-white border-b-4 border-red-950 hover:from-red-500 hover:to-red-700 shadow-[0_0_15px_rgba(220,38,38,0.4)]",
            gold: "bg-gradient-to-b from-yellow-300 via-yellow-500 to-yellow-600 text-yellow-950 border-b-4 border-yellow-800 hover:from-yellow-200 hover:to-yellow-400 shadow-[0_0_15px_rgba(202,138,4,0.4)]",
            dark: "bg-gradient-to-b from-gray-800 to-gray-900 text-white border-b-4 border-black hover:from-gray-700 hover:to-gray-800",
          };

          return (
            <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>
              {IconComponent && <IconComponent size={24} />}
              {children}
            </button>
          );
        };

        // Small pill-style selector for the setup screen
        const Chip = ({ active, onClick, children }) => (
          <button
            onClick={onClick}
            className={`px-4 py-2 rounded-full font-bold text-sm md:text-base tracking-wide transition-all duration-150 border ${
              active
                ? 'bg-gradient-to-b from-red-600 to-red-800 text-white border-red-950 shadow-[0_0_12px_rgba(220,38,38,0.5)]'
                : 'bg-black/50 text-gray-300 border-red-900/40 hover:border-red-600/60 hover:text-white'
            }`}
          >
            {children}
          </button>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
          const [screen, setScreen] = useState('menu');
          const [activeQuestions, setActiveQuestions] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [score, setScore] = useState(0);
          const [correctCount, setCorrectCount] = useState(0);
          const [streak, setStreak] = useState(0);
          const [maxStreak, setMaxStreak] = useState(0);
          const [lastGain, setLastGain] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [isAnswerCorrect, setIsAnswerCorrect] = useState(null);

          const [timeLeft, setTimeLeft] = useState(TIMER_SECONDS);
          const currentIndexRef = useRef(0);
          useEffect(() => { currentIndexRef.current = currentIndex; }, [currentIndex]);

          // Persisted state
          const [settings, setSettings] = useState(() => load('mufc_settings', { timer: true, sound: true }));
          const [leaderboard, setLeaderboard] = useState(() => load('mufc_leaderboard', DEFAULT_LEADERBOARD));
          const [playerName, setPlayerName] = useState(() => load('mufc_playername', ''));
          const [savedThisRound, setSavedThisRound] = useState(false);

          // Setup choices
          const [category, setCategory] = useState('All');
          const [difficulty, setDifficulty] = useState('All');
          const [quizLength, setQuizLength] = useState(10);

          // Sound engine reads latest "sound" setting via ref
          const soundRef = useRef(settings.sound);
          useEffect(() => { soundRef.current = settings.sound; }, [settings.sound]);
          const { play, unlock } = useSound(soundRef);

          // Persist settings & leaderboard whenever they change
          useEffect(() => { save('mufc_settings', settings); }, [settings]);
          useEffect(() => { save('mufc_leaderboard', leaderboard); }, [leaderboard]);

          const availableCount = QUESTION_BANK.filter(q =>
            (category === 'All' || q.cat === category) &&
            (difficulty === 'All' || q.diff === difficulty)
          ).length;

          const beginQuiz = () => {
            unlock(); // unlock audio on user gesture
            const pool = QUESTION_BANK.filter(q =>
              (category === 'All' || q.cat === category) &&
              (difficulty === 'All' || q.diff === difficulty)
            );
            const picked = shuffle(pool).slice(0, quizLength);
            // Shuffle each question's options so the correct answer isn't always
            // in the same slot, and recompute where the correct answer landed.
            const shuffled = picked.map(q => {
              const order = shuffle(q.options.map((opt, i) => ({ opt, i })));
              return {
                ...q,
                options: order.map(o => o.opt),
                correct: order.findIndex(o => o.i === q.correct),
              };
            });

            setActiveQuestions(shuffled);
            setCurrentIndex(0);
            setScore(0);
            setCorrectCount(0);
            setStreak(0);
            setMaxStreak(0);
            setLastGain(0);
            setSelectedAnswer(null);
            setIsAnswerCorrect(null);
            setSavedThisRound(false);
            setTimeLeft(TIMER_SECONDS);
            setScreen('quiz');
          };

          // Countdown timer
          useEffect(() => {
            if (screen !== 'quiz' || !settings.timer || selectedAnswer !== null) return;
            if (timeLeft === 0) {
              handleAnswerTimeOut();
              return;
            }
            if (timeLeft <= 5) play('tick');
            const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
            return () => clearInterval(timer);
          }, [timeLeft, screen, selectedAnswer, settings.timer]);

          const goToNextQuestion = useCallback(() => {
            if (currentIndexRef.current < activeQuestions.length - 1) {
              setCurrentIndex(prev => prev + 1);
              setSelectedAnswer(null);
              setIsAnswerCorrect(null);
              setTimeLeft(TIMER_SECONDS);
            } else {
              finishQuiz();
            }
          }, [activeQuestions.length]);

          const handleAnswerTimeOut = useCallback(() => {
            setSelectedAnswer(-1);
            setIsAnswerCorrect(false);
            setStreak(0);
            setLastGain(0);
            play('wrong');
            setTimeout(goToNextQuestion, 2000);
          }, [goToNextQuestion]);

          const handleAnswer = (index) => {
            if (selectedAnswer !== null) return;
            setSelectedAnswer(index);
            const correct = index === activeQuestions[currentIndex].correct;
            setIsAnswerCorrect(correct);

            if (correct) {
              const newStreak = streak + 1;
              const timeBonus = settings.timer ? Math.round((timeLeft / TIMER_SECONDS) * 500) : 0;
              const streakBonus = Math.min(newStreak - 1, 5) * 100; // up to +500 for hot streaks
              const gain = 500 + timeBonus + streakBonus;
              setScore(prev => prev + gain);
              setLastGain(gain);
              setCorrectCount(prev => prev + 1);
              setStreak(newStreak);
              setMaxStreak(prev => Math.max(prev, newStreak));
              play('correct');
            } else {
              setStreak(0);
              setLastGain(0);
              play('wrong');
            }
            setTimeout(goToNextQuestion, 2000);
          };

          const finishQuiz = () => {
            play('finish');
            setScreen('result');
          };

          const qualifiesForBoard = score > 0 && (leaderboard.length < 5 || score > leaderboard[leaderboard.length - 1].score);

          const saveScore = () => {
            const name = (playerName || '').trim() || 'You (Guest)';
            save('mufc_playername', name);
            setPlayerName(name);
            setLeaderboard(prev => {
              const updated = [...prev, { name, score }];
              return updated.sort((a, b) => b.score - a.score).slice(0, 5);
            });
            setSavedThisRound(true);
            play('click');
          };

          const resetLeaderboard = () => {
            setLeaderboard(DEFAULT_LEADERBOARD);
            play('click');
          };

          // Keyboard support: 1-4 to answer during quiz
          useEffect(() => {
            if (screen !== 'quiz') return;
            const onKey = (e) => {
              if (selectedAnswer !== null) return;
              const q = activeQuestions[currentIndex];
              if (!q) return;
              const n = parseInt(e.key, 10);
              if (n >= 1 && n <= q.options.length) handleAnswer(n - 1);

            window.addEventListener('keydown', onKey);
            return () => window.removeEventListener('keydown', onKey);
          }, [screen, selectedAnswer, currentIndex, activeQuestions, timeLeft, streak, settings.timer]);

          const renderMenu = () => (

                {QUESTION_BANK.length} REAL QUESTIONS

              <div className="flex flex-col gap-5 mt-6">

                <ActionButton onClick={() => setScreen('settings')} variant="dark" icon={SettingsIcon}>SETTINGS</ActionButton>
              </div>
            </div>
          );

          const renderSetup = () => (
            <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 pt-12 max-w-2xl mx-auto w-full">
              <h2 className="text-3xl md:text-4xl font-black text-white mb-8 tracking-widest uppercase">Match Setup</h2>

              <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
                <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Category</p>
                <div className="flex flex-wrap gap-2">
                  {CATEGORIES.map(c => (
                    <Chip key={c} active={category === c} onClick={() => { setCategory(c); play('click'); }}>{c}</Chip>
                  ))}
                </div>
              </div>

              <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
                <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Difficulty</p>
                <div className="flex flex-wrap gap-2">
                  {DIFFICULTIES.map(d => (
                    <Chip key={d} active={difficulty === d} onClick={() => { setDifficulty(d); play('click'); }}>{d}</Chip>
                  ))}
                </div>
              </div>

              <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl p-6 mb-6 shadow-2xl">
                <p className="text-yellow-500 font-bold uppercase tracking-widest text-sm mb-4">Number of Questions</p>
                <div className="flex flex-wrap gap-2">
                  {LENGTHS.map(l => (
                    <Chip key={l} active={quizLength === l} onClick={() => { setQuizLength(l); play('click'); }}>{l}</Chip>
                  ))}
                </div>
              </div>

              <p className="text-gray-400 text-sm mb-6">
                {availableCount} question{availableCount === 1 ? '' : 's'} match your filters
                {availableCount < quizLength ? ` — you'll get ${availableCount}.` : '.'}
              </p>

              <div className="flex flex-col gap-4 w-full items-center">
                <ActionButton onClick={beginQuiz} variant="red" icon={PlayIcon} className={availableCount === 0 ? 'opacity-40 pointer-events-none' : ''}>KICK OFF</ActionButton>
                <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>BACK</ActionButton>
              </div>
            </div>
          );

          const renderQuiz = () => {
            const question = activeQuestions[currentIndex];
            const isTimeout = selectedAnswer === -1;

            return (
              <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 max-w-4xl mx-auto w-full pt-12">
                <div className="flex justify-between items-center w-full mb-4 text-yellow-500 font-bold tracking-widest text-lg">
                  <div>Q: {currentIndex + 1} / {activeQuestions.length}</div>
                  <div className="flex items-center gap-4">
                    {streak >= 2 && (
                      <span className="flex items-center gap-1 text-orange-400 animate-pulse">
                        <FlameIcon size={20} /> x{streak}
                      </span>
                    )}
                    <span>SCORE: {score}</span>
                  </div>
                </div>

                {settings.timer && (
                  <div className="w-full bg-red-950 h-3 rounded-full mb-8 overflow-hidden border border-red-900">
                    <div
                      className={`h-full rounded-full transition-all duration-1000 ease-linear ${timeLeft < 5 ? 'bg-red-500' : 'bg-yellow-500'}`}
                      style={{ width: `${(timeLeft / TIMER_SECONDS) * 100}%` }}
                    ></div>
                  </div>
                )}
                {!settings.timer && <div className="mb-8" />}

                <div className="bg-black/60 backdrop-blur-md border border-red-900/50 p-6 md:p-10 rounded-3xl w-full mb-8 shadow-[0_0_30px_rgba(0,0,0,0.8)] min-h-[160px] flex items-center justify-center text-center">
                  <h2 className="text-xl md:text-2xl lg:text-3xl font-bold text-white leading-relaxed">
                    {question?.question}
                  </h2>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                  {question?.options.map((opt, idx) => {
                    let btnState = "bg-gradient-to-b from-gray-800 to-gray-900 border-gray-700 text-gray-200 hover:from-gray-700";
                    if (selectedAnswer !== null) {
                      if (idx === question.correct) {
                        btnState = "bg-gradient-to-b from-green-600 to-green-800 border-green-900 text-white animate-pulse shadow-[0_0_20px_rgba(22,163,74,0.6)]";
                      } else if (idx === selectedAnswer) {
                        btnState = "bg-gradient-to-b from-red-600 to-red-800 border-red-950 text-white opacity-80";
                      } else {
                        btnState = "bg-gray-900 border-gray-950 text-gray-600 opacity-50";
                      }
                    }
                    return (
                      <button
                        key={idx}
                        disabled={selectedAnswer !== null}
                        onClick={() => handleAnswer(idx)}
                        className={`relative py-5 px-6 rounded-2xl border-b-4 font-bold text-base md:text-lg transition-all duration-200 active:translate-y-1 active:border-b-0 flex items-center justify-center text-center gap-3 ${btnState}`}
                      >
                        <span className="hidden md:flex items-center justify-center w-7 h-7 rounded-md bg-black/40 text-sm text-gray-400 shrink-0">{idx + 1}</span>
                        <span>{opt}</span>
                      </button>
                    );
                  })}
                </div>

                <div className="h-16 mt-6 flex items-center justify-center">
                  {selectedAnswer !== null && isAnswerCorrect && (
                    <div className="text-green-400 font-black text-2xl tracking-widest uppercase flex items-center gap-2 animate-bounce">
                      <CheckIcon size={28} /> +{lastGain}
                    </div>
                  )}
                  {selectedAnswer !== null && !isAnswerCorrect && !isTimeout && (
                    <div className="text-red-500 font-black text-2xl tracking-widest uppercase flex items-center gap-2">
                      <XIcon size={28} /> WRONG!
                    </div>
                  )}
                  {isTimeout && (
                    <div className="text-red-500 font-black text-2xl animate-bounce tracking-widest uppercase">
                      TIME'S UP!
                    </div>
                  )}
                </div>
              </div>
            );
          };

          const renderResult = () => {
            const total = activeQuestions.length;
            const pct = total ? Math.round((correctCount / total) * 100) : 0;
            let verdict = "Keep practising, Red!";
            if (pct === 100) verdict = "Flawless — a true Old Trafford legend!";
            else if (pct >= 80) verdict = "Outstanding! Fergie would be proud.";
            else if (pct >= 60) verdict = "Solid performance, top half finish.";
            else if (pct >= 40) verdict = "Mid-table — room to improve.";

            return (
              <div className="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 text-center space-y-6">
                <img src="https://iili.io/CfNugZx.md.png" alt="United Road Logo" className="w-28 md:w-40 opacity-80" />
                <div className="bg-black/60 backdrop-blur-md border border-yellow-600/50 p-8 md:p-10 rounded-3xl flex flex-col items-center shadow-[0_0_40px_rgba(202,138,4,0.2)] w-full max-w-md">
                  <TrophyIcon size={64} className="text-yellow-500 mb-4 drop-shadow-[0_0_10px_rgba(202,138,4,0.8)]" />
                  <h2 className="text-3xl md:text-4xl font-black text-white mb-1 tracking-wider">FULL TIME!</h2>
                  <p className="text-gray-400 text-sm uppercase tracking-widest mb-6">Your Final Score</p>
                  <div className="text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-[#fde047] to-[#ca8a04]">
                    {score}
                  </div>

                  <div className="flex gap-6 mt-6 text-center">
                    <div>
                      <div className="text-2xl font-black text-white">{correctCount}/{total}</div>
                      <div className="text-xs text-gray-400 uppercase tracking-widest">Correct</div>
                    </div>
                    <div>
                      <div className="text-2xl font-black text-white">{pct}%</div>
                      <div className="text-xs text-gray-400 uppercase tracking-widest">Accuracy</div>
                    </div>
                    <div>
                      <div className="text-2xl font-black text-orange-400 flex items-center justify-center gap-1"><FlameIcon size={18} />{maxStreak}</div>
                      <div className="text-xs text-gray-400 uppercase tracking-widest">Best Streak</div>
                    </div>
                  </div>

                  <p className="text-yellow-500/90 font-bold mt-6 italic">{verdict}</p>

                  {qualifiesForBoard && !savedThisRound && (
                    <div className="w-full mt-6 border-t border-red-900/40 pt-6">
                      <p className="text-white font-bold mb-3">🏆 New high score! Save it:</p>
                      <div className="flex gap-2">
                        <input
                          type="text"
                          maxLength={16}
                          value={playerName}
                          onChange={(e) => setPlayerName(e.target.value)}
                          placeholder="Your name"
                          className="flex-1 bg-black/60 border border-red-900/60 rounded-lg px-4 py-3 text-white font-bold focus:outline-none focus:border-yellow-500"
                        />
                        <button onClick={saveScore} className="bg-gradient-to-b from-yellow-300 to-yellow-600 text-yellow-950 font-black px-5 rounded-lg border-b-4 border-yellow-800 active:translate-y-1 active:border-b-0">
                          SAVE
                        </button>
                      </div>
                    </div>
                  )}
                  {savedThisRound && (
                    <p className="text-green-400 font-bold mt-6 flex items-center gap-2"><CheckIcon size={20} /> Saved to the leaderboard!</p>
                  )}
                </div>

                <div className="flex flex-col gap-4 w-full items-center">
                  <ActionButton onClick={beginQuiz} variant="red" icon={PlayIcon}>PLAY AGAIN</ActionButton>
                  <ActionButton onClick={() => setScreen('leaderboard')} variant="gold" icon={TrophyIcon}>LEADERBOARD</ActionButton>
                  <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>MAIN MENU</ActionButton>
                </div>
              </div>
            );
          };

          const renderLeaderboard = () => (
            <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 pt-16 max-w-2xl mx-auto w-full">
              <h2 className="text-4xl font-black text-white mb-8 flex items-center gap-3 tracking-widest uppercase">
                <MedalIcon className="text-yellow-500" size={40} />
                Leaderboard
              </h2>
              <div className="w-full bg-black/60 backdrop-blur-md border border-red-900/50 rounded-3xl overflow-hidden mb-6 shadow-2xl">
                {leaderboard.map((entry, idx) => (
                  <div key={idx} className={`flex justify-between items-center p-6 border-b border-red-900/30 last:border-0 ${idx === 0 ? 'bg-red-950/60' : ''}`}>
                    <div className="flex items-center gap-4">
                      <span className={`font-black text-2xl ${idx === 0 ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]' : idx === 1 ? 'text-gray-300' : idx === 2 ? 'text-amber-700' : 'text-red-500'}`}>
                        #{idx + 1}
                      </span>
                      <span className="text-white font-bold text-xl">{entry.name}</span>
                    </div>
                    <span className="text-yellow-500 font-mono font-black text-2xl">{entry.score}</span>
                  </div>
                ))}
              </div>
              <button onClick={resetLeaderboard} className="text-gray-500 hover:text-red-400 text-sm font-bold uppercase tracking-widest mb-8 transition-colors">
                Reset Leaderboard
              </button>
              <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>BACK TO MENU</ActionButton>
            </div>
          );

          const renderSettings = () => (
            <div className="relative z-10 flex flex-col items-center justify-start min-h-screen p-4 md:p-8 pt-16 max-w-xl mx-auto w-full">
              <h2 className="text-4xl font-black text-white mb-10 flex items-center gap-3 tracking-widest uppercase">
                <SettingsIcon className="text-gray-400" size={40} />
                Settings
              </h2>
              <div className="w-full space-y-6 mb-12">
                <div className="bg-black/60 backdrop-blur-md border border-red-900/50 p-6 rounded-2xl flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <ClockIcon className="text-red-500" size={28} />
                    <span className="text-white font-bold text-xl">Quiz Timer</span>
                  </div>
                  <button onClick={() => { setSettings(s => ({ ...s, timer: !s.timer })); play('click'); }} className={`w-20 h-10 rounded-full p-1 transition-colors duration-300 ${settings.timer ? 'bg-green-600' : 'bg-gray-700'}`}>
                    <div className={`w-8 h-8 bg-white rounded-full transition-transform duration-300 ${settings.timer ? 'translate-x-10' : 'translate-x-0'}`}></div>
                  </button>
                </div>
                <div className="bg-black/60 backdrop-blur-md border border-red-900/50 p-6 rounded-2xl flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    {settings.sound ? <Volume2Icon className="text-red-500" size={28} /> : <VolumeXIcon className="text-gray-500" size={28} />}
                    <span className="text-white font-bold text-xl">Sound Effects</span>
                  </div>
                  <button onClick={() => { unlock(); const next = !settings.sound; setSettings(s => ({ ...s, sound: next })); if (next) { soundRef.current = true; play('correct'); } }} className={`w-20 h-10 rounded-full p-1 transition-colors duration-300 ${settings.sound ? 'bg-green-600' : 'bg-gray-700'}`}>
                    <div className={`w-8 h-8 bg-white rounded-full transition-transform duration-300 ${settings.sound ? 'translate-x-10' : 'translate-x-0'}`}></div>
                  </button>
                </div>
              </div>
              <ActionButton onClick={() => setScreen('menu')} variant="dark" icon={ArrowLeftIcon}>BACK TO MENU</ActionButton>
            </div>
          );

          return (
            <div className="min-h-screen font-sans selection:bg-red-500 selection:text-white">
              <SpotlightBackground />
              {screen === 'menu' && renderMenu()}
              {screen === 'setup' && renderSetup()}
              {screen === 'quiz' && renderQuiz()}
              {screen === 'result' && renderResult()}
              {screen === 'leaderboard' && renderLeaderboard()}
              {screen === 'settings' && renderSettings()}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
